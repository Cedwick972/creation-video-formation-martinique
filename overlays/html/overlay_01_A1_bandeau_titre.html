<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>Overlay A1 — Bandeau Titre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    background: transparent;
    position: relative;
    overflow: hidden;
  }
  .overlay-bandeau {
    position: absolute;
    top: 400px;
    left: 50%;
    transform: translateX(-50%);
    background: #F07D00;
    padding: 18px 48px;
    border-radius: 8px;
    min-width: 900px;
    text-align: center;
  }
  .overlay-bandeau h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    color: #FFFFFF;
    letter-spacing: 3px;
    line-height: 1.1;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="overlay-bandeau">
    <h1>FORMATION DRAINAGE LYMPHATIQUE</h1>
  </div>
</body>
</html>
